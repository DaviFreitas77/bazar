
services:
  # Backend Laravel (HTTP app server)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bazar_server
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=bazar_user
      - DB_PASSWORD=bazarroot
      - DB_DATABASE=db_bazar
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=predis
    expose:
      - "8000"
    depends_on:
      - mysql
      - redis
    restart: always
    networks:
      - laravel

    
  # Queue Laravel
  queue:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bazar_queue
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=predis
    depends_on:
      - mysql
      - redis
    restart: always
    networks:
      - laravel

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis_ecommerce
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - laravel

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: ecommerce
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_bazar
      MYSQL_USER: bazar_user
      MYSQL_PASSWORD: bazarroot
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel

    
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.production
    container_name: bazar_client
    restart: always
    expose:
      - "80"
    networks:
      - laravel
   


  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_all
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  mysql_data:
  redis_data: