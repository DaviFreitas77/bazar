
services:
 
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.production
    container_name: bazar_server
    env_file:
      - ./server/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=predis
    depends_on:
      - mysql
      - redis
    restart: always
    networks:
      - laravel
    volumes:
       - /mnt/laravel_storage:/var/www/html/storage/app/public

  # Queue Laravel
  queue:
    build:
      context: ./server
      dockerfile: Dockerfile.production
    container_name: bazar_queue
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    env_file:
      - ./server/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=predis
    depends_on:
      - mysql
      - redis
    restart: always
    networks:
      - laravel

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis_ecommerce
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - laravel

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: ecommerce
    restart: always
    ports:
      - "3306:3306"
    env_file:
      - ./server/.env
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel
  


  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_all
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server:/var/www/html
      - ./client/dist:/app/dist:ro   
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

    depends_on:
      - server
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  mysql_data:
  redis_data: