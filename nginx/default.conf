

server {
    listen 443 ssl;
    server_name freitasz.com.br;

    ssl_certificate /etc/letsencrypt/live/freitasz.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/freitasz.com.br/privkey.pem;

     location / {
        root /app/dist;
        index index.html;
        try_files $uri /index.html;
    }
}




server{
	listen 443 ssl;
    server_name api.freitasz.com.br;

    ssl_certificate /etc/letsencrypt/live/freitasz.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/freitasz.com.br/privkey.pem;


  	location /api {
    root /var/www/html/public;
    index index.php;
    try_files $uri /index.php?$query_string;
	}


	location /storage/ {
    alias /var/www/html/storage/app/public/;
    try_files $uri $uri/ =404;
}

	 # PHP-FPM
    location ~ \.php$ {
        root /var/www/html/public;

        fastcgi_pass server:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }


	}