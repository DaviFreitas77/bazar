services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"

    env_file:
      - ./server/.env

    environment:
      - APP_ENV=local
      - APP_DEBUG=false
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=predis
      
    depends_on:
      # - mysql
      - redis
    networks:
      - laravel

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    
    networks:
      - laravel

  queue:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    environment:
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=predis
    depends_on:
      # - mysql
      - redis
    restart: always
    networks:
      - laravel

  redis:
    image: redis:latest
    container_name: redis_ecommerce
    restart: always
    networks:
      - laravel
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_all
    restart: always
    ports:
      - "80:80"
      
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
      - client
    networks:
      - laravel

  # mysql:
  #   image: mysql:8.0
  #   container_name: ecommerce
  #   restart: always
  #   environment:
  #     MYSQL_ROOT_PASSWORD: root
  #     MYSQL_DATABASE: ecommerce

  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   networks:
  #     - laravel

networks:
  laravel:

volumes:
  # mysql_data:
  redis_data: